<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="container">
        <div class="todo-app">
            
            <div class="header">
                <div id="clock">00:00:00</div>
                <div class="streak-badge" title="Complete all tasks in a day to grow your streak!">
                    🔥 Streak: <span id="streak-count">0</span>
                </div>
                <button id="theme-toggle" title="Toggle Theme">🔆</button>
            </div>
            
            <h2>My Tasks</h2>
            
            <div class="calendar-container">
                <label for="date-picker">📅</label>
                <input type="date" id="date-picker">
            </div>

            <div class="add-task-container">
                <input type="text" id="input-box" placeholder="What needs to be done?" autocomplete="off">
                <div class="task-options">
                    <select id="priority-select" title="Set Priority">
                        <option value="Low">Low Priority</option>
                        <option value="Medium" selected>Medium Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                    <input type="time" id="time-picker" title="Optional Time">
                    <button id="add-button">Add</button>
                </div>
            </div>
            
            <div class="task-info">
                <p>Pending: <span id="pending-count">0</span></p>
                <p>Completed: <span id="completed-count">0</span></p>
            </div>
            
            <ul id="list-container">
                </ul>
            
            <div id="congratulations" class="hidden">
                <h3>🎉 All Done!</h3>
                <p>You've completed everything for this day.</p>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
